<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UHL Discord部公式サイト</title>
    <script type="text/javascript">
        // パス情報を安全にエンコードして index.html に引き渡す
        var pathSegmentsToKeep = 0; // ユーザー名.github.io/ の直下に置いている場合は 0。もしリポジトリ名がある場合は 1。どちらでも自動判別します。
        
        var l = window.location;
        // 現在のパスをクエリパラメータ「?p=」に変換して、index.html（トップページ）に強制転送
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
            encodeURIComponent(l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')) +
            (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
            l.hash
        );
    </script>
</head>
<body>
</body>
</html>
