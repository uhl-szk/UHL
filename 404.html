<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UHL Discord部公式サイト</title>
    <script type="text/javascript">
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' +
            encodeURIComponent(l.pathname.slice(1)) +
            (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
            l.hash
        );
    </script>
</head>

</body>
</html>
